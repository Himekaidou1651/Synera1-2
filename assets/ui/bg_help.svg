<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a365d;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2a4365;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a365d;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow1" cx="30%" cy="20%" r="40%">
      <stop offset="0%" style="stop-color:#3182ce;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#1a365d;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="glow2" cx="70%" cy="80%" r="35%">
      <stop offset="0%" style="stop-color:#2b6cb0;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#1a365d;stop-opacity:0" />
    </radialGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#glow1)"/>
  <rect width="1600" height="900" fill="url(#glow2)"/>
  <!-- 问号装饰 -->
  <g fill="none" stroke="#63b3ed" stroke-width="1.5" opacity="0.1">
    <text x="200" y="200" font-size="180" font-family="serif" fill="#63b3ed" opacity="0.06">?</text>
    <text x="1300" y="750" font-size="120" font-family="serif" fill="#63b3ed" opacity="0.06">?</text>
  </g>
  <!-- 书籍抽象线条 -->
