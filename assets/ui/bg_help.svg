    <rect x="1350" y="100" width="50" height="70" rx="3"/>
    <line x1="1350" y1="110" x2="1400" y2="110"/>
    <line x1="1350" y1="120" x2="1400" y2="120"/>
    <line x1="1350" y1="130" x2="1400" y2="130"/>
    <line x1="1350" y1="140" x2="1400" y2="140"/>
    <rect x="200" y="700" width="60" height="80" rx="3"/>
    <line x1="200" y1="715" x2="260" y2="715"/>
    <line x1="200" y1="730" x2="260" y2="730"/>
    <line x1="200" y1="745" x2="260" y2="745"/>
  </g>
  <!-- 星星装饰 -->
  <g fill="#63b3ed" opacity="0.08">
    <polygon points="800,100 805,115 820,115 808,125 812,140 800,130 788,140 792,125 780,115 795,115"/>
    <polygon points="100,500 103,508 112,508 105,514 108,523 100,517 92,523 95,514 88,508 97,508"/>
