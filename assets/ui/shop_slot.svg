<svg xmlns="http://www.w3.org/2000/svg" width="120" height="140" viewBox="0 0 120 140">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a3d52"/>
      <stop offset="100%" stop-color="#203042"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="0" y="0" width="120" height="140" rx="12" ry="12" fill="url(#bg)"/>
  <rect x="6" y="6" width="108" height="128" rx="10" ry="10" fill="none" stroke="#5f8fb8" stroke-width="3" filter="url(#glow)"/>
  <rect x="10" y="10" width="100" height="40" rx="8" ry="8" fill="#1e2c3b"/>
  <text x="60" y="35" font-family="Arial" font-size="12" fill="#ecf0f1" text-anchor="middle">商店槽位</text>
</svg>
