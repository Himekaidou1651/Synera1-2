<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#16213e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="30%" r="50%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:0.12" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="70%" r="40%">
      <stop offset="0%" style="stop-color:#533483;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:0" />
    </radialGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#glow1)"/>
  <rect width="1600" height="900" fill="url(#glow2)"/>
  <!-- 装饰性光环 -->
  <g fill="none" stroke="#e94560" stroke-width="0.5" opacity="0.08">
    <ellipse cx="800" cy="450" rx="600" ry="300"/>
    <ellipse cx="800" cy="450" rx="500" ry="250"/>
    <ellipse cx="800" cy="450" rx="400" ry="200"/>
    <ellipse cx="800" cy="450" rx="300" ry="150"/>
  </g>
  <!-- 信息图标装饰 -->
  <g fill="none" stroke="#e94560" stroke-width="1" opacity="0.06">
    <circle cx="150" cy="200" r="25"/>
    <circle cx="150" cy="200" r="15"/>
    <line x1="150" y1="185" x2="150" y2="175"/>
    <line x1="150" y1="195" x2="150" y2="215"/>
    <circle cx="1450" cy="700" r="20"/>
    <line x1="1450" y1="690" x2="1450" y2="685"/>
    <line x1="1450" y1="698" x2="1450" y2="712"/>
  </g>
  <!-- 粒子装饰 -->
  <g fill="#e94560" opacity="0.1">
    <circle cx="300" cy="150" r="2"/>
    <circle cx="500" cy="750" r="3"/>
    <circle cx="1100" cy="200" r="2"/>
    <circle cx="1300" cy="600" r="2.5"/>
    <circle cx="700" cy="700" r="2"/>
    <circle cx="900" cy="300" r="1.5"/>
    <circle cx="400" cy="400" r="2"/>
    <circle cx="1200" cy="350" r="1.5"/>
  </g>
</svg>