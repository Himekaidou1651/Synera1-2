<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1923;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a2533;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="30%" r="50%">
      <stop offset="0%" style="stop-color:#2a4365;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#0f1923;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="70%" r="40%">
      <stop offset="0%" style="stop-color:#553c7b;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#0f1923;stop-opacity:0" />
    </radialGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#glow1)"/>
  <rect width="1600" height="900" fill="url(#glow2)"/>
  <!-- 装饰性网格线 -->
  <g stroke="#2a4365" stroke-width="0.5" opacity="0.15">
    <line x1="0" y1="100" x2="1600" y2="100"/>
    <line x1="0" y1="200" x2="1600" y2="200"/>
    <line x1="0" y1="300" x2="1600" y2="300"/>
    <line x1="0" y1="400" x2="1600" y2="400"/>
    <line x1="0" y1="500" x2="1600" y2="500"/>
    <line x1="0" y1="600" x2="1600" y2="600"/>
    <line x1="0" y1="700" x2="1600" y2="700"/>
    <line x1="0" y1="800" x2="1600" y2="800"/>
    <line x1="200" y1="0" x2="200" y2="900"/>
    <line x1="400" y1="0" x2="400" y2="900"/>
    <line x1="600" y1="0" x2="600" y2="900"/>
    <line x1="800" y1="0" x2="800" y2="900"/>
    <line x1="1000" y1="0" x2="1000" y2="900"/>
    <line x1="1200" y1="0" x2="1200" y2="900"/>
    <line x1="1400" y1="0" x2="1400" y2="900"/>
  </g>
  <!-- 装饰性圆点 -->
  <circle cx="150" cy="150" r="3" fill="#4299e1" opacity="0.2"/>
  <circle cx="1450" cy="200" r="4" fill="#9f7aea" opacity="0.2"/>
  <circle cx="300" cy="750" r="3" fill="#4299e1" opacity="0.15"/>
  <circle cx="1300" cy="700" r="5" fill="#9f7aea" opacity="0.15"/>
  <circle cx="800" cy="100" r="2" fill="#48bb78" opacity="0.2"/>
  <circle cx="500" cy="500" r="3" fill="#4299e1" opacity="0.1"/>
  <circle cx="1100" cy="400" r="2" fill="#9f7aea" opacity="0.1"/>
</svg>